{% extends "base.html" %}
{% block title %}Edit Password | Secure Vault{% endblock %}
{% block content %}
<section class="section-header">
    <div>
        <span class="eyebrow">Update Entry</span>
        <h2>Edit {{ entry.site }}</h2>
        <p>For security, the password field must be re-entered and will be encrypted again after verification.</p>
    </div>
    <a href="{{ url_for('dashboard') }}" class="button secondary">Back to Dashboard</a>
</section>
<section class="panel form-panel">
    <form method="post" class="grid-form">
        <label>Site / App
            <input type="text" name="site" value="{{ entry.site }}" required>
        </label>
        <label>Login Username / Email
            <input type="text" name="entry_username" value="{{ entry.username }}" required>
        </label>
        <label class="full-width">New Password
            <input type="password" name="entry_password" required>
        </label>
        <label class="full-width">Notes
            <textarea name="notes" rows="4">{{ entry.notes or '' }}</textarea>
        </label>
        <label class="full-width">Confirm Master Password
            <input type="password" name="master_password" required>
        </label>
        <button type="submit" class="button primary">Update Securely</button>
    </form>
</section>
{% endblock %}
