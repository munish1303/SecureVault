{% extends "base.html" %}
{% block title %}Add Password | Secure Vault{% endblock %}
{% block content %}
<section class="section-header">
    <div>
        <span class="eyebrow">New Entry</span>
        <h2>Add a credential</h2>
        <p>The password is encrypted before it is stored in the database.</p>
    </div>
    <a href="{{ url_for('tools') }}" class="button secondary">Open Generator</a>
</section>
<section class="panel form-panel">
    <form method="post" class="grid-form">
        <label>Site / App
            <input type="text" name="site" required>
        </label>
        <label>Login Username / Email
            <input type="text" name="entry_username" required>
        </label>
        <label class="full-width">Password
            <input type="password" name="entry_password" required>
        </label>
        <label class="full-width">Notes
            <textarea name="notes" rows="4" placeholder="Optional notes, recovery hints, or tags."></textarea>
        </label>
        <label class="full-width">Confirm Master Password
            <input type="password" name="master_password" required>
        </label>
        <button type="submit" class="button primary">Save Securely</button>
    </form>
</section>
{% endblock %}
